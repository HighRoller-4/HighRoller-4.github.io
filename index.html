<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 번역기</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: #111827;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
        }

        .title {
            text-align: center;
            margin-bottom: 30px;
        }

        .title h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .title p {
            color: #94a3b8;
        }

        .translate-box {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: center;
        }

        .panel {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 420px;
        }

        .top {
            border: none;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        select {
            background: #0f172a;
            border: none;
            color: white;
            padding: 10px 14px;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
        }

        textarea {
            flex: 1;
            resize: none;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 18px;
            line-height: 1.5;
        }

        textarea::placeholder {
            color: #64748b;
        }

        .swap-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: #2563eb;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }

        .swap-btn:hover {
            transform: rotate(180deg) scale(1.1);
        }

        .bottom {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .char-count {
            color: #94a3b8;
            font-size: 14px;
        }

        .translate-btn {
            margin-top: 25px;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .translate-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        @media(max-width:900px) {

            .translate-box {
                grid-template-columns: 1fr;
            }

            .swap-btn {
                margin: auto;
                transform: rotate(90deg);
            }

            .swap-btn:hover {
                transform: rotate(270deg) scale(1.1);
            }
        }

        .title-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        .quick-tools {
            display: flex;
            gap: 12px;
        }

        .tool-btn {
            width: 58px;
            height: 58px;
            border: none;
            border-radius: 50%;
            background: #1e293b;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.25);
        }

        .tool-btn:hover {
            transform: translateY(-3px) scale(1.05);
            background: #2563eb;
        }

        .icon {
            width: 28px;
            height: 28px;
        }

        @media(max-width:700px) {

            .title-wrap {
                flex-direction: column;
            }

        }
    </style>
</head>

<body>

    <div class="container">

        <div class="title-wrap">

            <div class="title">
                <h1>High Translator</h1>
                <p>*베타 버전입니다.</p>
            </div>

            <div class="quick-tools">

                <!-- 카메라 -->
                <button class="tool-btn" onclick="location.href='/camera'">
                    <svg class="icon" viewBox="0 0 24 24" fill="none">
                        <path
                            d="M4 7C4 5.9 4.9 5 6 5H8L9.2 3.6C9.6 3.2 10.1 3 10.6 3H13.4C13.9 3 14.4 3.2 14.8 3.6L16 5H18C19.1 5 20 5.9 20 7V18C20 19.1 19.1 20 18 20H6C4.9 20 4 19.1 4 18V7Z"
                            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />

                        <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8" />
                    </svg>
                </button>

                <!-- 음성 -->
                <button class="tool-btn" onclick="location.href='/speech'">
                    <svg class="icon" viewBox="0 0 24 24" fill="none">

                        <path d="M6 10V14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

                        <path d="M10 7V17" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

                        <path d="M14 5V19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

                        <path d="M18 9V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

                    </svg>

                </button>

            </div>

        </div>

        <div class="translate-box">

            <!-- 입력 -->
            <div class="panel">

                <div class="top">
                    <select>
                        <option>한국어</option>
                        <option>영어</option>
                    </select>
                </div>

                <textarea id="inputText" placeholder="번역할 내용을 입력하세요..."></textarea>

                <div class="bottom">
                    <div class="char-count">
                        <span id="count">0</span> 글자
                    </div>
                </div>

            </div>

            <!-- 스왑 -->
            <button class="swap-btn">⇄</button>

            <!-- 출력 -->
            <div class="panel">

                <div class="top">
                    <select>
                        <option>영어</option>
                        <option>한국어</option>
                    </select>
                </div>

                <textarea id="outputText" placeholder="번역 결과가 표시됩니다..." readonly></textarea>

                <div class="bottom">
                    <div class="char-count">
                        Translation
                    </div>
                </div>

            </div>

        </div>

        <button class="translate-btn">
            번역하기
        </button>

    </div>

    <script>
        const inputText = document.getElementById("inputText");
        const outputText = document.getElementById("outputText");

        const count = document.getElementById("count");

        const translateBtn =
            document.querySelector(".translate-btn");

        const selects =
            document.querySelectorAll("select");

        const leftLang = selects[0];
        const rightLang = selects[1];

        const swapBtn =
            document.querySelector(".swap-btn");

        // 글자 수 카운트
        inputText.addEventListener("input", () => {
            count.textContent =
                inputText.value.length;
        });

        // 번역 버튼
        translateBtn.onclick = async () => {

            const text =
                inputText.value.trim();

            if (!text) {
                outputText.value =
                    "번역할 내용을 입력하세요.";
                return;
            }

            outputText.value =
                "번역 중...";

            try {

                const response =
                    await fetch("/api/translate", {

                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify({

                            text: text,

                            source: leftLang.value,
                            target: rightLang.value

                        })

                    });

                const data =
                    await response.json();

                if (data.status === "ok") {

                    outputText.value =
                        data.translated;

                } else {

                    outputText.value =
                        "번역 실패 : " + data.message;

                }

            }

            catch (err) {

                console.error(err);

                outputText.value =
                    "서버 오류 발생";

            }

        };

        // 언어 스왑
        swapBtn.onclick = () => {

            // select 값 교환
            const tempLang =
                leftLang.value;

            leftLang.value =
                rightLang.value;

            rightLang.value =
                tempLang;

            // textarea 값 교환
            const tempText =
                inputText.value;

            inputText.value =
                outputText.value;

            outputText.value =
                tempText;

        };
    </script>

</body>

</html>
