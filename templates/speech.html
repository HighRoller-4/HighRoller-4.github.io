<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Translator Speech</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: #111827;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.35);
        }

        .title-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        .title h1 {
            font-size: 42px;
            margin-bottom: 8px;
        }

        .title p {
            color: #94a3b8;
        }

        .quick-tools {
            display: flex;
            gap: 12px;
        }

        .tool-btn {
            width: 58px;
            height: 58px;
            border: none;
            border-radius: 50%;
            background: #1e293b;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .tool-btn:hover {
            background: #2563eb;
            transform: translateY(-3px);
        }

        .icon {
            width: 28px;
            height: 28px;
        }

        .main-panel {
            background: #1e293b;
            border-radius: 22px;
            padding: 24px;
        }

        .panel-title {
            font-size: 22px;
            margin-bottom: 24px;
            color: #cbd5e1;
        }

        .result-card {
            background: #0f172a;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .label {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 12px;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            background: transparent;
            border: none;
            resize: none;
            outline: none;
            color: white;
            font-size: 18px;
            line-height: 1.6;
        }

        textarea::placeholder {
            color: #64748b;
        }

        #translation-result {
            color: #60a5fa;
            font-weight: bold;
        }

        .mic-area {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        .mic-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(37, 99, 235, 0.35);
        }

        .mic-btn:hover {
            transform: scale(1.05);
        }

        .mic-btn.active {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 0 35px rgba(239, 68, 68, 0.5);
            animation: pulse 1s infinite;
        }

        .mic-icon {
            width: 46px;
            height: 46px;
        }

        @keyframes pulse {

            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }

        }

        @media(max-width:700px) {

            .title-wrap {
                flex-direction: column;
                align-items: flex-start;
            }

        }
    </style>
</head>

<body>

    <div class="container">

        <div class="title-wrap">

            <div class="title">
                <h1>High Translator</h1>
                <p>실시간 음성 번역 시스템</p>
            </div>

            <div class="quick-tools">

                <!-- 메인화면 -->
                <button class="tool-btn" onclick="location.href='/'">
                    T
                </button>

            </div>

        </div>

        <div class="main-panel">

            <div class="panel-title">
                Speech Translation
            </div>

            <div class="result-card">

                <div class="label">
                    음성 인식 결과
                </div>

                <textarea id="textBox" readonly placeholder="여기에 음성이 표시됩니다..."></textarea>

            </div>

            <div class="result-card">

                <div class="label">
                    번역 결과
                </div>

                <textarea id="translation-result" readonly placeholder="여기에 번역 결과가 표시됩니다..."></textarea>

            </div>

            <div class="mic-area">

                <button id="micBtn" class="mic-btn">

                    <svg class="icon" viewBox="0 0 24 24" fill="none">

                        <path d="M6 10V14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

                        <path d="M10 7V17" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

                        <path d="M14 5V19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

                        <path d="M18 9V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

                    </svg>

                </button>

            </div>

        </div>

    </div>

    <script>

        const SpeechRecognition =
            window.SpeechRecognition ||
            window.webkitSpeechRecognition;

        const recognition =
            new SpeechRecognition();

        const textBox =
            document.getElementById("textBox");

        const resultBox =
            document.getElementById("translation-result");

        const btn =
            document.getElementById("micBtn");

        let listening = false;

        recognition.lang = "en-US";
        recognition.continuous = false;
        recognition.interimResults = false;

        btn.onclick = () => {

            if (listening) {

                recognition.stop();

                listening = false;

                btn.classList.remove("active");

            } else {

                recognition.start();

                listening = true;

                btn.classList.add("active");

            }

        };

        recognition.onresult = (event) => {

            let transcript = "";

            for (let i = event.resultIndex;
                i < event.results.length;
                i++) {

                transcript +=
                    event.results[i][0].transcript;

            }

            textBox.value = transcript;

            resultBox.value = "번역 중...";

            fetch("/api/translate", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    text: transcript
                })

            })

                .then(async res => {

                    let data = await res.json();

                    if (data.status === "ok") {
                        resultBox.value =
                            data.translated;
                    }

                    else {
                        resultBox.value =
                            `번역 오류 : ${data.message}`;
                    }

                })

                .catch(err => {

                    console.log(err);

                    resultBox.value =
                        `오류 발생 : ${err.message}`;

                });

        };

        recognition.onend = () => {

            if (listening) {
                recognition.start();
            }

        };

        recognition.onerror = e => {

            console.log(e);

            alert(`error : ${e.error}`);

            listening = false;

            btn.classList.remove("active");

        };

    </script>

</body>

</html>
